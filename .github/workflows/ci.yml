name: CI — Test & Build

on:
  push:
    branches: [main, develop, 'feature/**', 'codex/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend
          version: latest

  # ────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Generate Prisma Client
        run: CGO_ENABLED=0 go run github.com/steebchen/prisma-client-go generate

      - name: Download modules
        run: go mod download

      - name: Run tests with coverage
        run: |
          CGO_ENABLED=0 go test ./internal/... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout 60s
        env:
          JWT_SECRET: test-secret-for-ci-only-do-not-use-in-production
          JWT_EXPIRY_HOURS: '24'
          PORT: '8082'
          # No DB required — tests use mock interfaces

      - name: Check coverage thresholds (middleware ≥ 80%, handlers ≥ 50%)
        run: |
          echo "=== Coverage by package ==="
          go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ────────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          VITE_API_URL: http://localhost:8081/api/v1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Security — Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for TruffleHog

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ────────────────────────────────────────────────────────────────────
  semgrep-scan:
    name: Security — Semgrep Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit p/secrets p/golang p/react

  # ────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
